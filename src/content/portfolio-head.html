<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel Cilfone — Full Stack Developer</title>
  <meta name="description" content="Self-directed full stack developer based in Rosario, Argentina. 3+ years building production systems end-to-end — from architecture to deployment." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #0f0f1a;
      --violet: #7c3aed;
      --cyan: #06b6d4;
      --violet-light: #a855f7;
      --cyan-light: #22d3ee;
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --grad: linear-gradient(135deg, #7c3aed, #06b6d4);
      --font: 'Plus Jakarta Sans', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--violet); border-radius: 3px; }

    .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(3deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(20px) rotate(-3deg); }
    }
    @keyframes pulse-orb {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.08); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .fade-in-up {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fade-in-up.delay-1 { transition-delay: 0.1s; }
    .fade-in-up.delay-2 { transition-delay: 0.2s; }
    .fade-in-up.delay-3 { transition-delay: 0.3s; }
    .fade-in-up.delay-4 { transition-delay: 0.4s; }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,15,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s;
    }
    .nav-logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }
    .nav-links a:hover { color: var(--text); }

    /* Hero */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 80px 40px 60px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 70%);
      top: -100px; left: -200px;
      animation: pulse-orb 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(6,182,212,0.25) 0%, transparent 70%);
      bottom: -100px; right: -150px;
      animation: pulse-orb 10s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, transparent 70%);
      top: 50%; right: 20%;
      animation: pulse-orb 12s ease-in-out infinite 3s;
    }

    .hero-content {
      text-align: center;
      max-width: 800px;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      font-size: 13px;
      font-family: var(--mono);
      color: var(--violet-light);
      margin-bottom: 28px;
      animation: fadeInUp 0.8s ease forwards;
    }
    .hero-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 2s ease-in-out infinite;
    }

    .hero-name {
      font-size: clamp(52px, 8vw, 88px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -3px;
      margin-bottom: 16px;
      animation: fadeInUp 0.8s ease 0.1s forwards;
      opacity: 0;
    }

    .hero-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 20px;
      animation: fadeInUp 0.8s ease 0.2s forwards;
      opacity: 0;
    }

    .hero-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.7;
      animation: fadeInUp 0.8s ease 0.3s forwards;
      opacity: 0;
    }

    .hero-ctas {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease 0.4s forwards;
      opacity: 0;
    }

    .btn-primary {
      padding: 14px 32px;
      border-radius: 100px;
      background: var(--grad);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 0 32px rgba(124,58,237,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 48px rgba(124,58,237,0.6);
    }

    .btn-secondary {
      padding: 14px 32px;
      border-radius: 100px;
      background: transparent;
      color: var(--text);
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
    }

    /* Floating shapes */
    .floating-shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .shape {
      position: absolute;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .shape-1 {
      width: 60px; height: 60px;
      top: 20%; left: 10%;
      animation: float 7s ease-in-out infinite;
      transform: rotate(30deg);
    }
    .shape-2 {
      width: 40px; height: 40px;
      top: 70%; left: 8%;
      border-radius: 50%;
      animation: float2 9s ease-in-out infinite;
    }
    .shape-3 {
      width: 80px; height: 80px;
      top: 30%; right: 8%;
      animation: float2 6s ease-in-out infinite;
      transform: rotate(15deg);
    }
    .shape-4 {
      width: 30px; height: 30px;
      top: 75%; right: 12%;
      border-radius: 6px;
      animation: float 11s ease-in-out infinite;
      transform: rotate(45deg);
    }
    .shape-5 {
      width: 50px; height: 50px;
      top: 55%; left: 50%;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite 2s;
    }

    /* Sections */
    section {
      padding: 100px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--violet-light);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 48px;
    }

    /* About */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
    .about-bio {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .about-bio strong { color: var(--text); font-weight: 600; }
    .about-traits {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .trait-card {
      padding: 20px 24px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .trait-card:hover {
      border-color: rgba(124,58,237,0.3);
      transform: translateX(4px);
    }
    .trait-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .trait-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .trait-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    /* Stack */
    .stack-grid {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .stack-category-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .tech-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tech-badge {
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--mono);
      color: var(--text);
      transition: all 0.2s;
      cursor: default;
      white-space: nowrap;
    }
    .tech-badge:hover {
      background: rgba(124,58,237,0.12);
      border-color: rgba(124,58,237,0.4);
      color: var(--violet-light);
      transform: translateY(-2px);
    }

    /* Experience timeline */
    .timeline {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 20px;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, rgba(124,58,237,0.5), rgba(6,182,212,0.5), transparent);
    }
    .timeline-item {
      padding-left: 60px;
      position: relative;
    }
    .timeline-dot {
      position: absolute;
      left: 12px;
      top: 24px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--grad);
      box-shadow: 0 0 16px rgba(124,58,237,0.6);
    }
    .exp-card {
      padding: 28px 32px;
      border-radius: 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      transition: border-color 0.3s, transform 0.3s;
    }
    .exp-card:hover {
      border-color: rgba(124,58,237,0.3);
      transform: translateX(4px);
    }
    .exp-role {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .exp-company {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .exp-meta {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .exp-meta-badge {
      padding: 3px 10px;
      border-radius: 100px;
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.2);
      color: var(--cyan-light);
      font-size: 11px;
    }
    .exp-desc {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .exp-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .exp-tech {
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted);
    }

    /* Featured Project */
    .featured-card {
      position: relative;
      padding: 44px 48px;
      border-radius: 24px;
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
      overflow: hidden;
      box-shadow: 0 0 80px rgba(124,58,237,0.12), 0 0 0 1px rgba(124,58,237,0.15);
      transition: transform 0.35s, box-shadow 0.35s;
    }
    .featured-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(124,58,237,0.7) 0%, rgba(6,182,212,0.7) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .featured-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 120px rgba(124,58,237,0.2), 0 0 0 1px rgba(124,58,237,0.25);
    }
    .featured-glow-1 {
      position: absolute;
      top: -80px; left: -80px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .featured-glow-2 {
      position: absolute;
      bottom: -60px; right: -60px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .featured-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(6,182,212,0.25));
      border: 1px solid rgba(124,58,237,0.4);
      color: #c4b5fd;
      font-family: var(--mono);
    }
    .featured-name {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -1.5px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .featured-tagline {
      font-size: 15px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    .featured-desc {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 28px;
      max-width: 800px;
    }
    .featured-desc strong { color: var(--text); font-weight: 600; }
    .featured-highlights {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .featured-highlight {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      transition: border-color 0.2s, background 0.2s;
    }
    .featured-highlight:hover {
      background: rgba(124,58,237,0.06);
      border-color: rgba(124,58,237,0.2);
    }
    .featured-tech {
      font-family: var(--mono);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      color: var(--violet-light);
      font-weight: 500;
    }
    @media (max-width: 768px) {
      .featured-card { padding: 28px 24px; }
      .featured-highlights { grid-template-columns: 1fr; }
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .project-card {
      padding: 32px;
      border-radius: 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s, border-color 0.3s;
      cursor: default;
    }
    .project-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      padding: 1px;
      background: var(--grad);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .project-card:hover::before { opacity: 1; }
    .project-card:hover { transform: translateY(-4px); }

    .project-glow {
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .project-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 500;
      margin-bottom: 20px;
    }
    .status-dev {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      color: #fbbf24;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 2s ease-in-out infinite;
    }
    .project-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .project-tagline {
      font-size: 14px;
      color: var(--violet-light);
      font-weight: 500;
      margin-bottom: 14px;
    }
    .project-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .project-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .project-tech-tag {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.15);
      color: var(--violet-light);
    }
    .project-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
