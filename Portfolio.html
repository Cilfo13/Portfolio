<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel Cilfone — Full Stack Developer</title>
  <meta name="description" content="Self-directed full stack developer based in Rosario, Argentina. 3+ years building production systems end-to-end — from architecture to deployment." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #0f0f1a;
      --violet: #7c3aed;
      --cyan: #06b6d4;
      --violet-light: #a855f7;
      --cyan-light: #22d3ee;
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --grad: linear-gradient(135deg, #7c3aed, #06b6d4);
      --font: 'Plus Jakarta Sans', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--violet); border-radius: 3px; }

    .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(3deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(20px) rotate(-3deg); }
    }
    @keyframes pulse-orb {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.08); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .fade-in-up {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fade-in-up.delay-1 { transition-delay: 0.1s; }
    .fade-in-up.delay-2 { transition-delay: 0.2s; }
    .fade-in-up.delay-3 { transition-delay: 0.3s; }
    .fade-in-up.delay-4 { transition-delay: 0.4s; }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,15,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s;
    }
    .nav-logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }
    .nav-links a:hover { color: var(--text); }

    /* Hero */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 80px 40px 60px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 70%);
      top: -100px; left: -200px;
      animation: pulse-orb 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(6,182,212,0.25) 0%, transparent 70%);
      bottom: -100px; right: -150px;
      animation: pulse-orb 10s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, transparent 70%);
      top: 50%; right: 20%;
      animation: pulse-orb 12s ease-in-out infinite 3s;
    }

    .hero-content {
      text-align: center;
      max-width: 800px;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      font-size: 13px;
      font-family: var(--mono);
      color: var(--violet-light);
      margin-bottom: 28px;
      animation: fadeInUp 0.8s ease forwards;
    }
    .hero-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 2s ease-in-out infinite;
    }

    .hero-name {
      font-size: clamp(52px, 8vw, 88px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -3px;
      margin-bottom: 16px;
      animation: fadeInUp 0.8s ease 0.1s forwards;
      opacity: 0;
    }

    .hero-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 20px;
      animation: fadeInUp 0.8s ease 0.2s forwards;
      opacity: 0;
    }

    .hero-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.7;
      animation: fadeInUp 0.8s ease 0.3s forwards;
      opacity: 0;
    }

    .hero-ctas {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease 0.4s forwards;
      opacity: 0;
    }

    .btn-primary {
      padding: 14px 32px;
      border-radius: 100px;
      background: var(--grad);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 0 32px rgba(124,58,237,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 48px rgba(124,58,237,0.6);
    }

    .btn-secondary {
      padding: 14px 32px;
      border-radius: 100px;
      background: transparent;
      color: var(--text);
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
    }

    /* Floating shapes */
    .floating-shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .shape {
      position: absolute;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .shape-1 {
      width: 60px; height: 60px;
      top: 20%; left: 10%;
      animation: float 7s ease-in-out infinite;
      transform: rotate(30deg);
    }
    .shape-2 {
      width: 40px; height: 40px;
      top: 70%; left: 8%;
      border-radius: 50%;
      animation: float2 9s ease-in-out infinite;
    }
    .shape-3 {
      width: 80px; height: 80px;
      top: 30%; right: 8%;
      animation: float2 6s ease-in-out infinite;
      transform: rotate(15deg);
    }
    .shape-4 {
      width: 30px; height: 30px;
      top: 75%; right: 12%;
      border-radius: 6px;
      animation: float 11s ease-in-out infinite;
      transform: rotate(45deg);
    }
    .shape-5 {
      width: 50px; height: 50px;
      top: 55%; left: 50%;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite 2s;
    }

    /* Sections */
    section {
      padding: 100px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--violet-light);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 48px;
    }

    /* About */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
    .about-bio {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .about-bio strong { color: var(--text); font-weight: 600; }
    .about-traits {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .trait-card {
      padding: 20px 24px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .trait-card:hover {
      border-color: rgba(124,58,237,0.3);
      transform: translateX(4px);
    }
    .trait-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .trait-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .trait-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    /* Stack */
    .stack-grid {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .stack-category-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .tech-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tech-badge {
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--mono);
      color: var(--text);
      transition: all 0.2s;
      cursor: default;
      white-space: nowrap;
    }
    .tech-badge:hover {
      background: rgba(124,58,237,0.12);
      border-color: rgba(124,58,237,0.4);
      color: var(--violet-light);
      transform: translateY(-2px);
    }

    /* Experience timeline */
    .timeline {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 20px;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, rgba(124,58,237,0.5), rgba(6,182,212,0.5), transparent);
    }
    .timeline-item {
      padding-left: 60px;
      position: relative;
    }
    .timeline-dot {
      position: absolute;
      left: 12px;
      top: 24px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--grad);
      box-shadow: 0 0 16px rgba(124,58,237,0.6);
    }
    .exp-card {
      padding: 28px 32px;
      border-radius: 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      transition: border-color 0.3s, transform 0.3s;
    }
    .exp-card:hover {
      border-color: rgba(124,58,237,0.3);
      transform: translateX(4px);
    }
    .exp-role {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .exp-company {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .exp-meta {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .exp-meta-badge {
      padding: 3px 10px;
      border-radius: 100px;
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.2);
      color: var(--cyan-light);
      font-size: 11px;
    }
    .exp-desc {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .exp-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .exp-tech {
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted);
    }

    /* Featured Project */
    .featured-card {
      position: relative;
      padding: 44px 48px;
      border-radius: 24px;
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
      overflow: hidden;
      box-shadow: 0 0 80px rgba(124,58,237,0.12), 0 0 0 1px rgba(124,58,237,0.15);
      transition: transform 0.35s, box-shadow 0.35s;
    }
    .featured-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(124,58,237,0.7) 0%, rgba(6,182,212,0.7) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .featured-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 120px rgba(124,58,237,0.2), 0 0 0 1px rgba(124,58,237,0.25);
    }
    .featured-glow-1 {
      position: absolute;
      top: -80px; left: -80px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .featured-glow-2 {
      position: absolute;
      bottom: -60px; right: -60px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .featured-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(6,182,212,0.25));
      border: 1px solid rgba(124,58,237,0.4);
      color: #c4b5fd;
      font-family: var(--mono);
    }
    .featured-name {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -1.5px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .featured-tagline {
      font-size: 15px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    .featured-desc {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 28px;
      max-width: 800px;
    }
    .featured-desc strong { color: var(--text); font-weight: 600; }
    .featured-highlights {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .featured-highlight {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      transition: border-color 0.2s, background 0.2s;
    }
    .featured-highlight:hover {
      background: rgba(124,58,237,0.06);
      border-color: rgba(124,58,237,0.2);
    }
    .featured-tech {
      font-family: var(--mono);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      color: var(--violet-light);
      font-weight: 500;
    }
    @media (max-width: 768px) {
      .featured-card { padding: 28px 24px; }
      .featured-highlights { grid-template-columns: 1fr; }
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .project-card {
      padding: 32px;
      border-radius: 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s, border-color 0.3s;
      cursor: default;
    }
    .project-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      padding: 1px;
      background: var(--grad);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .project-card:hover::before { opacity: 1; }
    .project-card:hover { transform: translateY(-4px); }

    .project-glow {
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .project-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 500;
      margin-bottom: 20px;
    }
    .status-dev {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      color: #fbbf24;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 2s ease-in-out infinite;
    }
    .project-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .project-tagline {
      font-size: 14px;
      color: var(--violet-light);
      font-weight: 500;
      margin-bottom: 14px;
    }
    .project-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .project-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .project-tech-tag {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.15);
      color: var(--violet-light);
    }
    .project-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 8px 16px;

      border: 1px solid var(--glass-border);

      border-color: rgba(255,255,255,0.2);

    .coming-soon {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--mono);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px dashed rgba(255,255,255,0.1);
    }

    /* Contact */
    #contact {
      text-align: center;
    }
    .contact-card {
      max-width: 600px;
      margin: 0 auto;
      padding: 56px;
      border-radius: 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
    }
    .contact-glow {
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .contact-avail {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);

      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;

    .contact-avail-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: blink 2s ease-in-out infinite;
    }
    .contact-msg {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: stretch;
      max-width: 320px;
      margin: 0 auto;
    }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .contact-link:hover {
      background: rgba(124,58,237,0.1);
      border-color: rgba(124,58,237,0.3);
      transform: translateX(4px);
    }
    .contact-link-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .contact-link-icon.email { background: rgba(124,58,237,0.15); }
    .contact-link-icon.linkedin { background: rgba(6,182,212,0.15); }
    .contact-link-sub {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-top: 2px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
      border-top: 1px solid var(--glass-border);
      font-family: var(--mono);
    }

    /* Mobile */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 20px; }
      .nav-links a { font-size: 13px; }
      section { padding: 80px 20px; }
      #hero { padding: 80px 20px 60px; }
      .about-grid { grid-template-columns: 1fr; gap: 32px; }
      .projects-grid { grid-template-columns: 1fr; }
      .contact-card { padding: 36px 24px; }
    }
    @media (max-width: 520px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentFrom": "#7c3aed",
      "accentTo": "#06b6d4",
      "bgBase": "#0a0a0f",
      "nameSize": 88,
      "showFloatingShapes": true
    }/*EDITMODE-END*/;

    // ----- Scroll animation hook -----
    function useScrollReveal() {
      React.useEffect(() => {
        const els = document.querySelectorAll('.fade-in-up');
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) e.target.classList.add('visible');
          });
        }, { threshold: 0.12 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

    // ----- Nav -----
    function Nav() {
      const [scrolled, setScrolled] = React.useState(false);
      React.useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', fn);
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const links = [
        { href: '#about', label: 'About' },
        { href: '#experience', label: 'Experience' },
        { href: '#stack', label: 'Stack' },
        { href: '#featured', label: 'Featured' },
        { href: '#projects', label: 'Projects' },
        { href: '#contact', label: 'Contact' },
      ];

      return (
        <nav style={{ boxShadow: scrolled ? '0 2px 40px rgba(0,0,0,0.4)' : 'none' }}>
          <div className="nav-logo">AC.</div>
          <ul className="nav-links">
            {links.map(l => (
              <li key={l.href}>
                <a href={l.href}>{l.label}</a>
              </li>
            ))}
          </ul>
        </nav>
      );
    }

    // ----- Hero -----
    function Hero({ tweaks }) {
      return (
        <section id="hero" style={{ maxWidth: '100%', paddingLeft: 0, paddingRight: 0 }}>
          <div className="orb orb-1"></div>
          <div className="orb orb-2"></div>
          <div className="orb orb-3"></div>

          {tweaks.showFloatingShapes && (
            <div className="floating-shapes">
              <div className="shape shape-1"></div>
              <div className="shape shape-2"></div>
              <div className="shape shape-3"></div>
              <div className="shape shape-4"></div>
              <div className="shape shape-5"></div>
            </div>
          )}

          <div className="hero-content">
            <div className="hero-badge">
              <span className="hero-badge-dot"></span>
              Available for remote opportunities
            </div>
            <h1 className="hero-name">
              <span className="grad-text">Angel</span>{' '}
              <span style={{ color: 'var(--text)' }}>Cilfone</span>
            </h1>
            <p className="hero-title">Full Stack Developer</p>
            <p className="hero-subtitle">
              Building production systems end-to-end —<br />from architecture to deployment.
            </p>
            <div className="hero-ctas">
              <a href="#projects" className="btn-primary">View Projects</a>
              <a href="#contact" className="btn-secondary">Contact Me</a>
            </div>
          </div>
        </section>
      );
    }

    // ----- About -----
    function About() {
      const traits = [
        { icon: '⚡', title: 'Curiosity-driven', desc: 'Constantly exploring new patterns, architectures, and tooling — then actually using them in production.' },
        { icon: '🌐', title: 'Remote-native', desc: 'Built for async collaboration. Clear communicator across time zones, zero hand-holding needed.' },
        { icon: '🏗️', title: 'End-to-end ownership', desc: 'Requirements → architecture → deployment → support. No handoffs, no gaps.' },
      ];
      return (
        <section id="about">
          <div className="fade-in-up">
            <div className="section-label">// about me</div>
            <h2 className="section-title">
              Who I <span className="grad-text">am</span>
            </h2>
          </div>
          <div className="about-grid">
            <div className="about-bio fade-in-up delay-1">
              <p style={{ marginBottom: '20px' }}>
                Self-directed full stack developer based in <strong>Rosario, Argentina</strong>.{' '}
                <strong>3+ years of freelance experience</strong> building and maintaining real production systems
                solo — from requirements to deployment.
              </p>
              <p style={{ marginBottom: '20px' }}>
                Systems Engineering student at <strong>UTN</strong>. Passionate about backend architecture,
                cloud infrastructure, and building tools that solve actual problems — not just demos.
              </p>
              <p>
                I work best on systems where correctness and reliability matter: billing platforms,
                multi-tenant SaaS, integrations with external APIs. If it runs in production and
                real users depend on it, that's where I thrive.
              </p>
            </div>
            <div className="about-traits fade-in-up delay-2">
              {traits.map(t => (
                <div className="trait-card" key={t.title}>
                  <div className="trait-icon">{t.icon}</div>
                  <div>
                    <div className="trait-title">{t.title}</div>
                    <div className="trait-desc">{t.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ----- Stack -----
    function Stack() {
      const categories = [
        { label: 'Languages', techs: ['PHP', 'Java', 'JavaScript', 'TypeScript', 'SQL'] },
        { label: 'Frameworks', techs: ['Laravel', 'Spring Boot', 'React', 'React Native', 'Vite', 'Tailwind CSS'] },
        { label: 'Databases', techs: ['MySQL'] },
        { label: 'Cloud & Infra', techs: ['AWS', 'REST APIs', 'JWT', 'Multi-tenant architecture'] },
        { label: 'Tools', techs: ['Git', 'Postman', 'Maven', 'Flyway'] },
      ];
      return (
        <section id="stack">
          <div className="fade-in-up">
            <div className="section-label">// tech stack</div>
            <h2 className="section-title">
              What I <span className="grad-text">work with</span>
            </h2>
          </div>
          <div className="stack-grid fade-in-up delay-1">
            {categories.map((cat, i) => (
              <div key={cat.label} className="fade-in-up" style={{ transitionDelay: `${0.1 * i}s` }}>
                <div className="stack-category-label">{cat.label}</div>
                <div className="tech-badges">
                  {cat.techs.map(t => (
                    <span className="tech-badge" key={t}>{t}</span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // ----- Experience -----
    function Experience() {
      const jobs = [
        {
          role: 'Senior Developer',
          company: 'Transban · SUBE · Banco Municipal de Rosario',
          period: 'March 2023 – Present',
          type: 'Freelance · Remote',
          desc: 'Built and maintain a billing management system integrated with Argentina\'s national transit card (SUBE) and Banco Municipal de Rosario. Handled full project lifecycle solo: requirements, architecture, development, deployment, testing, and ongoing support.',
          stack: ['PHP', 'Laravel', 'React Native', 'MySQL', 'AWS'],
        },
        {
          role: 'Full Stack Developer',
          company: 'Freelance Projects',
          period: 'Feb 2023 – Oct 2023',
          type: 'Remote',
          desc: 'Multiple simultaneous client projects: church data management system, maintenance department workflow system, billing and collections web + mobile app.',
          stack: ['PHP', 'Laravel', 'React Native', 'MySQL'],
        },
      ];

      return (
        <section id="experience">
          <div className="fade-in-up">
            <div className="section-label">// experience</div>
            <h2 className="section-title">
              Where I've <span className="grad-text">worked</span>
            </h2>
          </div>
          <div className="timeline">
            {jobs.map((job, i) => (
              <div className="timeline-item fade-in-up" style={{ transitionDelay: `${0.15 * i}s` }} key={i}>
                <div className="timeline-dot"></div>
                <div className="exp-card">
                  <div className="exp-role">
                    {job.role} — <span className="exp-company">{job.company}</span>
                  </div>
                  <div className="exp-meta">
                    <span style={{ fontFamily: 'var(--mono)' }}>{job.period}</span>
                    <span className="exp-meta-badge">{job.type}</span>
                  </div>
                  <p className="exp-desc">{job.desc}</p>
                  <div className="exp-stack">
                    {job.stack.map(t => (
                      <span className="exp-tech" key={t}>{t}</span>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // ----- Featured Project -----
    function FeaturedProject() {
      return (
        <section id="featured" style={{ paddingBottom: 0 }}>
          <div className="fade-in-up">
            <div className="section-label">// flagship work</div>
            <h2 className="section-title">
              Featured <span className="grad-text">Project</span>
            </h2>
          </div>
          <div className="featured-card fade-in-up delay-1">
            {/* Glow layers */}
            <div className="featured-glow-1"></div>
            <div className="featured-glow-2"></div>

            {/* Top row */}
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, marginBottom: 28 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
                <span className="featured-label">★ Featured</span>
                <span className="project-status" style={{
                  background: 'rgba(34,197,94,0.1)',
                  border: '1px solid rgba(34,197,94,0.25)',
                  color: '#4ade80',
                  margin: 0,
                }}>
                  <span className="status-dot" style={{ background: '#4ade80' }}></span>
                  Live in Production
                </span>
              </div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-muted)', display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#4ade80', display: 'inline-block' }}></span>
                2+ years in active use
              </div>
            </div>

            {/* Title block */}
            <div style={{ marginBottom: 20 }}>
              <h3 className="featured-name">CobroConnect</h3>
              <p className="featured-tagline">Production Billing Management System · AWS · Rosario, Argentina</p>
            </div>

            {/* Description */}
            <p className="featured-desc">
              A billing and collections management system deployed on AWS, currently in active daily use.
              Integrated with <strong>SUBE</strong> (Argentina's national transit card) and <strong>Banco Municipal de Rosario</strong>.
              Built and maintained solo — requirements gathering, architecture, development, deployment, testing,
              and ongoing support from day one.
            </p>

            {/* Highlights grid */}
            <div className="featured-highlights">
              {[
                { icon: '💳', text: 'Live system handling real financial transactions' },
                { icon: '📱', text: 'Web app + companion mobile app for field workers' },
                { icon: '☁️', text: 'Multi-user, deployed and hosted on AWS' },
                { icon: '🔧', text: '2+ years of continuous maintenance & feature additions' },
              ].map((h, i) => (
                <div className="featured-highlight" key={i}>
                  <span style={{ fontSize: 18 }}>{h.icon}</span>
                  <span>{h.text}</span>
                </div>
              ))}
            </div>

            {/* Stack */}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 28 }}>
              {['PHP', 'Laravel', 'React Native', 'MySQL', 'AWS'].map(t => (
                <span key={t} className="featured-tech">{t}</span>
              ))}
            </div>

            {/* Footer note */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingTop: 20, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: 'var(--text-muted)', flexShrink: 0 }}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>Access restricted to client users.</span>
            </div>
          </div>
        </section>
      );
    }

    // ----- Projects -----
    function Projects() {
      const projects = [
        {
          name: 'Electroclima',
          tagline: 'Multi-tenant SaaS for HVAC professionals',
          desc: 'Vertical SaaS platform for independent HVAC technicians in Argentina. Centralizes client management, equipment registry, service orders, budgets, PDF generation, and Argentine-specific billing logic (monotributo limit tracking).',
          tech: ['Spring Boot', 'Java', 'React', 'TypeScript', 'Vite', 'Tailwind', 'TanStack Query', 'MySQL', 'JWT'],
          status: 'In Development',
          link: null,
        },
      ];

      return (
        <section id="projects">
          <div className="fade-in-up">
            <div className="section-label">// projects</div>
            <h2 className="section-title">
              What I've <span className="grad-text">built</span>
            </h2>
          </div>
          <div className="projects-grid">
            {projects.map((p, i) => (
              <div className="project-card fade-in-up" style={{ transitionDelay: `${0.1 * i}s` }} key={i}>
                <div className="project-glow"></div>
                {p.status && (
                  <div className="project-status status-dev">
                    <span className="status-dot"></span>
                    {p.status}
                  </div>
                )}
                <div className="project-name">{p.name}</div>
                <div className="project-tagline">{p.tagline}</div>
                <p className="project-desc">{p.desc}</p>
                <div className="project-tech">
                  {p.tech.map(t => <span className="project-tech-tag" key={t}>{t}</span>)}
                </div>
                {p.link ? (
                  <a href={p.link} target="_blank" rel="noopener noreferrer" className="project-link-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    View Project
                  </a>
                ) : (
                  <span className="coming-soon">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Coming Soon
                  </span>
                )}
              </div>
            ))}

            {/* More coming card */}
            <div className="project-card fade-in-up delay-2" style={{
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'center',
              textAlign: 'center',
              minHeight: '280px',
              borderStyle: 'dashed',
              cursor: 'default',
            }}>
              <div style={{
                width: 56, height: 56,
                borderRadius: '14px',
                background: 'rgba(124,58,237,0.1)',
                border: '1px solid rgba(124,58,237,0.2)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: 24,
                marginBottom: 16,
              }}>+</div>
              <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 8 }}>More in the pipeline</div>
              <div style={{ fontSize: 14, color: 'var(--text-muted)', lineHeight: 1.6 }}>
                Additional projects shipping in 2025.<br />Reach out to hear more.
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ----- Contact -----
    function Contact() {
      return (
        <section id="contact">
          <div className="fade-in-up">
            <div className="section-label">// contact</div>
            <h2 className="section-title" style={{ textAlign: 'center' }}>
              Let's <span className="grad-text">connect</span>
            </h2>
          </div>
          <div className="contact-card fade-in-up delay-1">
            <div className="contact-glow"></div>
            <div className="contact-avail">
              <span className="contact-avail-dot"></span>
              Open to opportunities
            </div>
            <p className="contact-msg">
              Available for remote backend and full stack opportunities.<br />
              I reply within 24 hours.
            </p>
            <div className="contact-links">
              <a href="mailto:angelcilfone@hotmail.com" className="contact-link">
                <div className="contact-link-icon email">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a855f7" strokeWidth="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/></svg>
                </div>
                <div>
                  <span>Email</span>
                  <span className="contact-link-sub">angelcilfone@hotmail.com</span>
                </div>
              </a>
              <a href="https://linkedin.com/in/angelcilfone" target="_blank" rel="noopener noreferrer" className="contact-link">
                <div className="contact-link-icon linkedin">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" strokeWidth="2"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                </div>
                <div>
                  <span>LinkedIn</span>
                  <span className="contact-link-sub">linkedin.com/in/angelcilfone</span>
                </div>
              </a>
            </div>
          </div>
        </section>
      );
    }

    // ----- App -----
    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Apply tweaks as CSS custom properties
      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--violet', tweaks.accentFrom);
        root.style.setProperty('--cyan', tweaks.accentTo);
        root.style.setProperty('--grad', `linear-gradient(135deg, ${tweaks.accentFrom}, ${tweaks.accentTo})`);
        root.style.setProperty('--bg', tweaks.bgBase);
        document.querySelector('.hero-name') && (
          document.querySelector('.hero-name').style.fontSize = tweaks.nameSize + 'px'
        );
      }, [tweaks]);

      useScrollReveal();

      return (
        <>
          <Nav />
          <Hero tweaks={tweaks} />
          <About />
          <Experience />
          <Stack />
          <FeaturedProject />
          <Projects />
          <Contact />
          <footer>
            Built with care · Angel Cilfone · {new Date().getFullYear()}
          </footer>
          <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
            <TweakSection label="Palette">
              <TweakColor id="accentFrom" label="Accent From (Violet)" tweaks={tweaks} setTweak={setTweak} />
              <TweakColor id="accentTo" label="Accent To (Cyan)" tweaks={tweaks} setTweak={setTweak} />
              <TweakColor id="bgBase" label="Background Base" tweaks={tweaks} setTweak={setTweak} />
            </TweakSection>
            <TweakSection label="Hero">
              <TweakSlider id="nameSize" label="Name Font Size" min={48} max={120} step={2} tweaks={tweaks} setTweak={setTweak} />
              <TweakToggle id="showFloatingShapes" label="Floating Shapes" tweaks={tweaks} setTweak={setTweak} />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
